<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>50-in-1 Browser</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

.container {
    margin-top: 20px;
}

input {
    width: 70%;
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🔥 50-in-1 Browser</h1>

<div class="container">
    <input type="text" id="searchBox" placeholder="Search or enter URL">
    <br>

    <button onclick="searchAll()">🔎 Search All</button>
    <button onclick="createTabs()">➕ Create Tabs</button>
</div>

<script>
let tabCount = 5; // change to 50 later

// SEARCH FUNCTION (WORKING)
function searchAll() {
    let query = document.getElementById("searchBox").value;

    if (!query) {
        alert("Enter something to search!");
        return;
    }

    if (!query.startsWith("http")) {
        query = "https://www.google.com/search?q=" + query;
    }

    for (let i = 0; i < tabCount; i++) {
        window.open(query, "_blank");
    }
}

// CREATE EMPTY TABS (WORKING)
function createTabs() {
    for (let i = 0; i < tabCount; i++) {
        window.open("about:blank", "_blank");
    }
}
</script>

</body>
</html>
