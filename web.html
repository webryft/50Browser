<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>50-in-1 Browser</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    margin: 20px;
}

input {
    width: 70%;
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}

/* GRID */
#tabs {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    padding: 10px;
}

@media (min-width: 768px) {
    #tabs {
        grid-template-columns: 1fr 1fr;
    }
}

/* TAB BOX */
.tab {
    background: #222;
    border: 2px solid #444;
    position: relative;
}

/* CONTROLS */
.controls {
    position: absolute;
    top: 5px;
    right: 5px;
    z-index: 10;
}

.controls button {
    padding: 3px 6px;
    font-size: 12px;
    margin-left: 3px;
}

/* IFRAME */
iframe {
    width: 100%;
    height: 300px;
    border: none;
}

/* MAXIMIZED MODE */
.fullscreen {
    position: fixed !important;
    top: 0;
    left: 0;
    width: 100% !important;
    height: 100% !important;
    z-index: 9999;
}

.fullscreen iframe {
    height: 100% !important;
}
</style>
</head>

<body>

<h1>🔥 50-in-1 Browser</h1>

<div class="container">
    <input type="text" id="searchBox" placeholder="Paste YouTube or site link">
    <br>

    <button onclick="createTabs()">➕ Create Tabs</button>
    <button onclick="searchAll()">🔎 Load in All Tabs</button>
</div>

<div id="tabs"></div>

<script>
let tabCount = 4;

// CREATE TABS
function createTabs() {
    let container = document.getElementById("tabs");
    container.innerHTML = "";

    for (let i = 0; i < tabCount; i++) {
        createSingleTab(container);
    }
}

// CREATE ONE TAB
function createSingleTab(container) {
    let tab = document.createElement("div");
    tab.className = "tab";

    // Controls
    let controls = document.createElement("div");
    controls.className = "controls";

    // Minimize
    let minBtn = document.createElement("button");
    minBtn.innerText = "➖";
    minBtn.onclick = () => {
        iframe.style.display =
            iframe.style.display === "none" ? "block" : "none";
    };

    // Maximize
    let maxBtn = document.createElement("button");
    maxBtn.innerText = "⬜";
    maxBtn.onclick = () => {
        tab.classList.toggle("fullscreen");
    };

    // Close
    let closeBtn = document.createElement("button");
    closeBtn.innerText = "❌";
    closeBtn.onclick = () => {
        tab.remove();
    };

    controls.appendChild(minBtn);
    controls.appendChild(maxBtn);
    controls.appendChild(closeBtn);

    // Iframe
    let iframe = document.createElement("iframe");
    iframe.src = "about:blank";

    tab.appendChild(controls);
    tab.appendChild(iframe);

    container.appendChild(tab);
}

// FIX URL
function fixUrl(url) {
    if (!url.startsWith("http")) {
        url = "https://" + url;
    }

    // YouTube watch
    if (url.includes("youtube.com/watch")) {
        let id = url.split("v=")[1]?.split("&")[0];
        return "https://www.youtube.com/embed/" + id;
    }

    // YouTube shorts
    if (url.includes("youtube.com/shorts/")) {
        let id = url.split("/shorts/")[1]?.split("?")[0];
        return "https://www.youtube.com/embed/" + id;
    }

    return url;
}

// LOAD ALL
function searchAll() {
    let input = document.getElementById("searchBox").value;

    if (!input) {
        alert("Paste a link!");
        return;
    }

    let url = fixUrl(input);

    let frames = document.querySelectorAll("iframe");

    frames.forEach(frame => {
        frame.src = url;
    });
}
</script>

</body>
</html>
