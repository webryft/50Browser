<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>50-in-1 Browser</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    margin: 20px;
}

input {
    width: 70%;
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
}

/* GRID LAYOUT */
#tabs {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    padding: 10px;
}

/* Desktop = 2 columns */
@media (min-width: 768px) {
    #tabs {
        grid-template-columns: 1fr 1fr;
    }
}

iframe {
    width: 100%;
    height: 300px;
    border: 2px solid #444;
    background: white;
}
</style>
</head>

<body>

<h1>🔥 50-in-1 Browser</h1>

<div class="container">
    <input type="text" id="searchBox" placeholder="Search or URL">
    <br>

    <button onclick="createTabs()">➕ Create Tabs</button>
    <button onclick="searchAll()">🔎 Search All</button>
</div>

<div id="tabs"></div>

<script>
let tabCount = 4; // start small (increase later)

function createTabs() {
    let container = document.getElementById("tabs");
    container.innerHTML = "";

    for (let i = 0; i < tabCount; i++) {
        let frame = document.createElement("iframe");
        frame.src = "about:blank";
        container.appendChild(frame);
    }
}

<script>
function searchAll() {
    let query = document.getElementById("searchBox").value;

    if (!query) {
        alert("Enter something!");
        return;
    }

    let url;

    if (!query.startsWith("http")) {
        url = "https://duckduckgo.com/?q=" + query;
    } else {
        url = query;
    }

    let frames = document.querySelectorAll("iframe");

    frames.forEach(frame => {
        try {
            frame.src = url;
        } catch (e) {}
    });

    // ALSO open one real tab (fallback)
    window.open(url, "_blank");
}
</script>

</body>
</html>
